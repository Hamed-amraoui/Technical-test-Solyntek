- hosts: all
  become: true
  vars:
    app_dir: /opt/solyntek
    app_owner: ubuntu
    app_group: ubuntu
    local_project_dir: "{{ playbook_dir }}/.."
    database_url: "mongodb://mongodb:27017/solyntek_db"

  tasks:
    - name: Ensure required apt packages are installed
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose
        state: present
        update_cache: true

    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Ensure application directory exists
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_owner }}"
        group: "{{ app_group }}"
        mode: "0755"

    - name: Copy docker-compose file
      ansible.builtin.copy:
        src: "{{ local_project_dir }}/docker-compose.yml"
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: "{{ app_owner }}"
        group: "{{ app_group }}"
        mode: "0644"

    - name: Copy backend source
      ansible.builtin.copy:
        src: "{{ local_project_dir }}/backend"
        dest: "{{ app_dir }}/"
        owner: "{{ app_owner }}"
        group: "{{ app_group }}"
        mode: preserve

    - name: Copy frontend source
      ansible.builtin.copy:
        src: "{{ local_project_dir }}/frontend"
        dest: "{{ app_dir }}/"
        owner: "{{ app_owner }}"
        group: "{{ app_group }}"
        mode: preserve

    - name: Fail if JWT secret was not provided
      ansible.builtin.assert:
        that:
          - jwt_secret is defined
          - (jwt_secret | trim | length) > 0
        fail_msg: "Provide jwt_secret via extra vars before deployment."

    - name: Create application environment file
      ansible.builtin.copy:
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_owner }}"
        group: "{{ app_group }}"
        mode: "0600"
        content: |
          DATABASE={{ database_url }}
          JWT_SECRET={{ jwt_secret }}
          REACT_APP_SERVER_URL={{ react_app_server_url | default('http://' ~ ansible_host ~ ':8000/api') }}

    - name: Check if swapfile exists
      ansible.builtin.stat:
        path: /swapfile
      register: swapfile_stat

    - name: Create 2G swapfile when missing
      ansible.builtin.command: fallocate -l 2G /swapfile
      when: not swapfile_stat.stat.exists

    - name: Set swapfile permissions
      ansible.builtin.file:
        path: /swapfile
        owner: root
        group: root
        mode: "0600"
      when: not swapfile_stat.stat.exists

    - name: Format swapfile
      ansible.builtin.command: mkswap /swapfile
      when: not swapfile_stat.stat.exists

    - name: Enable swapfile
      ansible.builtin.command: swapon /swapfile
      when: not swapfile_stat.stat.exists

    - name: Persist swapfile in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "/swapfile none swap sw 0 0"
        state: present

    - name: Build and run containers
      ansible.builtin.shell: |
        set -e
        cd "{{ app_dir }}"
        docker-compose down --remove-orphans || true
        docker-compose up -d --build
      args:
        executable: /bin/bash
