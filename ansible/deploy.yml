- hosts: all
  become: true
  vars:
    app_dir: /opt/solyntek
    app_owner: ubuntu
    app_group: ubuntu
    local_project_dir: "{{ playbook_dir }}/.."
    database_url: "mongodb://mongodb:27017/solyntek_db"
    swapfile_path: /swapfile
    swap_size_mb: 4096
    swap_size_bytes: "{{ swap_size_mb * 1024 * 1024 }}"

  tasks:
    - name: Ensure required apt packages are installed
      ansible.builtin.apt:
        name:
          - docker.io
          - docker-compose
        state: present
        update_cache: true

    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Ensure application directory exists
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_owner }}"
        group: "{{ app_group }}"
        mode: "0755"

    - name: Copy docker-compose file
      ansible.builtin.copy:
        src: "{{ local_project_dir }}/docker-compose.yml"
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: "{{ app_owner }}"
        group: "{{ app_group }}"
        mode: "0644"

    - name: Copy backend source
      ansible.builtin.copy:
        src: "{{ local_project_dir }}/backend"
        dest: "{{ app_dir }}/"
        owner: "{{ app_owner }}"
        group: "{{ app_group }}"
        mode: preserve

    - name: Copy frontend source
      ansible.builtin.copy:
        src: "{{ local_project_dir }}/frontend"
        dest: "{{ app_dir }}/"
        owner: "{{ app_owner }}"
        group: "{{ app_group }}"
        mode: preserve

    - name: Fail if JWT secret was not provided
      ansible.builtin.assert:
        that:
          - jwt_secret is defined
          - (jwt_secret | trim | length) > 0
        fail_msg: "Provide jwt_secret via extra vars before deployment."

    - name: Create application environment file
      ansible.builtin.copy:
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_owner }}"
        group: "{{ app_group }}"
        mode: "0600"
        content: |
          DATABASE={{ database_url }}
          JWT_SECRET={{ jwt_secret }}
          REACT_APP_SERVER_URL={{ react_app_server_url | default('http://' ~ ansible_host ~ ':8000/api') }}

    - name: Check if swapfile exists
      ansible.builtin.stat:
        path: "{{ swapfile_path }}"
      register: swapfile_stat

    - name: Determine whether swapfile needs rebuild
      ansible.builtin.set_fact:
        swap_needs_rebuild: "{{ (not swapfile_stat.stat.exists) or (swapfile_stat.stat.size | default(0) | int != swap_size_bytes | int) }}"

    - name: Disable swapfile when resizing
      ansible.builtin.command: "swapoff {{ swapfile_path }}"
      when: swapfile_stat.stat.exists and (swapfile_stat.stat.size | default(0) | int != swap_size_bytes | int)
      failed_when: false

    - name: Remove swapfile when resizing
      ansible.builtin.file:
        path: "{{ swapfile_path }}"
        state: absent
      when: swapfile_stat.stat.exists and (swapfile_stat.stat.size | default(0) | int != swap_size_bytes | int)

    - name: Create swapfile when missing or resized
      ansible.builtin.command: "fallocate -l {{ swap_size_mb }}M {{ swapfile_path }}"
      when: swap_needs_rebuild

    - name: Set swapfile permissions
      ansible.builtin.file:
        path: "{{ swapfile_path }}"
        owner: root
        group: root
        mode: "0600"
      when: swap_needs_rebuild

    - name: Format swapfile
      ansible.builtin.command: "mkswap {{ swapfile_path }}"
      when: swap_needs_rebuild

    - name: Enable swapfile
      ansible.builtin.command: "swapon {{ swapfile_path }}"
      when: swap_needs_rebuild

    - name: Persist swapfile in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "{{ swapfile_path }} none swap sw 0 0"
        state: present

    - name: Prune unused Docker data to free disk space
      ansible.builtin.shell: |
        docker system prune -af || true
      args:
        executable: /bin/bash

    - name: Build and run containers
      ansible.builtin.shell: |
        set -e
        cd "{{ app_dir }}"
        export DOCKER_BUILDKIT=0
        export COMPOSE_DOCKER_CLI_BUILD=0
        docker-compose down --remove-orphans || true
        docker-compose up -d --build
      args:
        executable: /bin/bash
