name: Deploy To AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: true
  AWS_REGION: us-east-1

jobs:
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    outputs:
      instance_ip: ${{ steps.tf_output.outputs.instance_ip }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ github.repository }}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}"

      - name: Terraform validate
        working-directory: terraform
        run: |
          terraform fmt -check
          terraform validate

      - name: Terraform apply
        working-directory: terraform
        run: |
          SSH_INGRESS_CIDR="${{ secrets.SSH_INGRESS_CIDR }}"
          if [ -z "${SSH_INGRESS_CIDR}" ]; then
            SSH_INGRESS_CIDR="0.0.0.0/0"
          fi

          terraform apply -auto-approve -input=false \
            -var "aws_region=${AWS_REGION}" \
            -var "key_name=${{ secrets.AWS_EC2_KEY_NAME }}" \
            -var "ssh_ingress_cidr=${SSH_INGRESS_CIDR}" \
            -var "instance_type=t3.small" \
            -var "root_volume_size=30"

      - name: Capture Terraform outputs
        id: tf_output
        working-directory: terraform
        run: |
          echo "instance_ip=$(terraform output -raw instance_public_ip)" >> "${GITHUB_OUTPUT}"

  ansible:
    name: Configure Server And Deploy App
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: pip install ansible

      - name: Configure SSH private key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s" "${{ secrets.AWS_SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Create Ansible inventory
        run: |
          cat > ansible/inventory.ini <<EOF
          [app]
          solyntek ansible_host=${{ needs.terraform.outputs.instance_ip }} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF

      - name: Wait for SSH to become available
        run: |
          for i in {1..30}; do
            if ssh -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ubuntu@${{ needs.terraform.outputs.instance_ip }} "echo ok" >/dev/null 2>&1; then
              echo "SSH is reachable."
              exit 0
            fi
            echo "SSH not ready yet. Retrying in 10s..."
            sleep 10
          done

          echo "Unable to connect to instance over SSH."
          exit 1

      - name: Run Ansible deployment
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/deploy.yml \
            --extra-vars "jwt_secret=${{ secrets.JWT_SECRET }} react_app_server_url=http://${{ needs.terraform.outputs.instance_ip }}:8000/api"
